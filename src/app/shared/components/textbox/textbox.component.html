<div class="mb-4" *ngIf="size == 'rg'">
    <app-label>
        <ng-container *ngTemplateOutlet="tempOutlet"></ng-container>
    </app-label>
    <div class="mt-1 w-full">
        <input
            *ngIf="type != 'number' && type != 'currency'"
            [formControl]="$any(control)"
            class="w-full px-4 py-2 border text-black rounded-lg focus:outline-none focus:ring-2 focus:border-primary text-wrap"
            [readonly]="readonly"
            [type]="type"
            (focus)="isFocused = true"
        />
        <input
            *ngIf="type == 'number'"
            [formControl]="$any(control)"
            class="w-full px-4 py-2 border text-black rounded-lg focus:outline-none focus:ring-2 focus:border-primary text-pretty"
            [readonly]="readonly"
            appNumeric
            (focus)="isFocused = true"
        />
        <!-- <input
            *ngIf="type == 'currency'"
            [formControlName]="control"
            class="w-full px-4 py-2 text-label border rounded-lg focus:outline-none focus:ring focus:border-primary text-wrap"
            [readonly]="readonly"
            [type]="'number'"
            currency
    /> -->
    </div>
    <app-errors [control]="$any(control)" *ngIf="useErrors"></app-errors>
</div>
<div class="mb-4 h-56" *ngIf="size == 'lg'">
    <app-label [class]="labelClass">
        <ng-container *ngTemplateOutlet="tempOutlet"></ng-container>
    </app-label>
    <textarea
        [formControl]="$any(control)"
        class="w-full h-5/6 px-4 py-2 mt-1 text-black border rounded-lg focus:outline-none focus:ring-2 focus:border-primary text-wrap resize-none"
        [readonly]="readonly"
    ></textarea>
</div>


<ng-template #tempOutlet>
    <ng-content></ng-content>
</ng-template>
