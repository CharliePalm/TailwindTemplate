<div class="my-4">
  <label class="text-lg font-semibold block mb-2">
    <ng-content></ng-content>
  </label>
  <div class="flex gap-6 flex-wrap">
    <!-- Drop Target -->
    <div
      cdkDropList
      #selected="cdkDropList"
      [cdkDropListConnectedTo]="[options]"
      [cdkDropListData]="selectedOptions"
      class="w-full border border-dashed p-4 centered-flexbox gap-3 flex-wrap min-h-24"
      (cdkDropListDropped)="drop($event)"
    >
      <div
        class="bg-primary text-white p-2 rounded-lg mb-2 cursor-move"
        *ngFor="let option of selectedOptions"
        cdkDrag
      >
        {{ option }}
      </div>
    </div>

    <!-- Available Options -->
    <div
      cdkDropList
      #options="cdkDropList"
      [cdkDropListData]="availableOptions"
      [cdkDropListConnectedTo]="[selected]"
      class="w-full border p-4 centered-flexbox gap-3 flex-wrap"
      (cdkDropListDropped)="drop($event)"
    >
      <div
        class="bg-primary p-2 rounded-lg mb-2 cursor-move"
        *ngFor="let option of availableOptions"
        cdkDrag
      >
        {{ option }}
      </div>
    </div>
  </div>
</div>
