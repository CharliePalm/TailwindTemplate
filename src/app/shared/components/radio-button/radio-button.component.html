<label class="flex items-center cursor-pointer z-10" [ngClass]="{'justify-start pl-2 my-1': stacked, 'justify-center': !stacked}">
    <input
      type="radio"
      class="peer hidden"
    />
    <div class="flex justify-center items-center w-5 h-5 border-2 border-gray-400 rounded-full" *ngIf="mode == 'simple'">
      <div class="w-3.5 h-3.5 bg-primary rounded-full opacity-0 duration-200" [ngClass]="{'opacity-100': selected}"></div>
    </div>
    <span class="text-white pl-2" *ngIf="mode == 'simple'">{{ label }}</span>
    <label
        *ngIf="mode == 'fancy'"
        class="cursor-pointer flex ml-0 items-center justify-center truncate select-none font-semibold text-md rounded-full py-2 transition duration-300 ease-in-out"
        [ngClass]="{'text-label': !selected, 'text-white': selected }"
    >{{ label }}</label>
</label>
